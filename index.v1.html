<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Ashley Denham — Coder, Builder, Creator.">
  <meta property="og:title" content="Ashley Denham">
  <meta property="og:description" content="Hi, I'm Ashley Denham.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ashleydenham.me/">
  <meta name="theme-color" content="#0f0f23">
  <link rel="canonical" href="https://ashleydenham.me/">
  <title>Ashley Denham</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', monospace;
      background: #0f0f23;
      color: #cccccc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      image-rendering: pixelated;
      position: relative;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Pixel grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 46, 99, 0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Avatar */
    .avatar {
      width: 140px;
      height: 140px;
      border: 4px solid #ff2e63;
      box-shadow:
        0 0 0 4px #0f0f23,
        0 0 0 8px #ff69b4,
        0 0 30px rgba(255, 46, 99, 0.4);
      border-radius: 0;
      image-rendering: pixelated;
      margin: 0 auto 2rem;
      display: block;
    }

    /* Greeting */
    h1 {
      font-size: 1rem;
      color: #ff2e63;
      line-height: 2;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 0 #330011;
    }

    h1 .name {
      color: #ff69b4;
      font-size: 1.2rem;
      display: block;
      margin-top: 0.25rem;
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.1em;
      background: #ff69b4;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Divider */
    .divider {
      border: none;
      height: 4px;
      background: linear-gradient(90deg, transparent, #ff2e63, #ff69b4, #ff2e63, transparent);
      margin: 2rem 0;
      image-rendering: pixelated;
    }

    /* Section titles */
    .section-title {
      font-size: 0.65rem;
      color: #00d4ff;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      text-shadow: 1px 1px 0 #003344;
    }

    .section-title::before { content: '> '; color: #ff2e63; }

    /* Project cards */
    .projects {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 0;
    }

    .project {
      background: #1a1a3e;
      border: 2px solid #ff2e63;
      padding: 1.2rem;
      text-align: left;
      transition: all 0.1s step-end;
      position: relative;
    }

    .project::before {
      content: '';
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(255, 46, 99, 0.3);
      z-index: -1;
    }

    .project:hover {
      background: #2a1a4e;
      border-color: #ff69b4;
      box-shadow: 0 0 20px rgba(255, 46, 99, 0.3);
    }

    .project-name {
      font-size: 0.7rem;
      color: #ff69b4;
      margin-bottom: 0.5rem;
    }

    .project-desc {
      font-size: 0.5rem;
      color: #9999bb;
      line-height: 1.8;
    }

    /* Socials */
    .socials {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .social-link {
      font-size: 0.55rem;
      color: #666688;
      letter-spacing: 2px;
      text-decoration: none;
      padding: 0.6rem 1rem;
      border: 2px solid #333355;
      transition: all 0.1s step-end;
      position: relative;
    }

    .social-link:hover {
      color: #00d4ff;
      border-color: #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
      text-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      font-size: 0.4rem;
      color: #333355;
      letter-spacing: 2px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      h1 { font-size: 0.75rem; }
      h1 .name { font-size: 0.9rem; }
      .avatar { width: 110px; height: 110px; }
      .socials { gap: 0.8rem; }
      .social-link { font-size: 0.45rem; padding: 0.5rem 0.7rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <img class="avatar" src="avatar.jpg" alt="Ashley Denham" width="140" height="140">

    <h1>
      Hi, I'm
      <span class="name">Ashley Denham<span class="cursor"></span></span>
    </h1>

    <hr class="divider">

    <div class="section-title">My Projects</div>
    <div class="projects">
      <div class="project">
        <div class="project-name">Pink Pulse</div>
        <div class="project-desc">My Trading Assistant</div>
      </div>
      <div class="project">
        <div class="project-name">Hammy</div>
        <div class="project-desc">My Personal AI</div>
      </div>
    </div>

    <hr class="divider">

    <div class="section-title">Socials</div>
    <div class="socials">
      <a class="social-link" href="https://twitter.com" target="_blank" rel="noopener">TWITTER</a>
      <a class="social-link" href="https://reddit.com" target="_blank" rel="noopener">REDDIT</a>
      <a class="social-link" href="https://linkedin.com" target="_blank" rel="noopener">LINKEDIN</a>
    </div>

    <div class="footer">PRESS START TO CONTINUE</div>
  </div>

</body>
</html>
