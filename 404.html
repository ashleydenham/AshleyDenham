<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#FAF5F8">
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100svh;
      font-family: "DM Sans", system-ui, sans-serif;
      color: #111827;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background: linear-gradient(180deg, #FAF5F8, #F3EAF0);
      -webkit-font-smoothing: antialiased;
    }
    .card {
      text-align: center;
      max-width: 28rem;
      border-radius: 1.5rem;
      padding: clamp(2rem, 6vw, 3rem);
      background: rgba(255,255,255,0.6);
      box-shadow: 6px 6px 14px rgba(180,160,175,0.18), -6px -6px 14px rgba(255,255,255,0.7);
      animation: rise 0.5s ease both;
    }
    .code {
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 700;
      color: #E0218A;
      opacity: 0.25;
    }
    h1 { font-family: "Playfair Display", Georgia, serif; font-size: 1.4rem; font-weight: 700; margin-top: 0.5rem; }
    p { color: #4B5563; margin-top: 0.5rem; line-height: 1.6; font-size: 0.95rem; }
    .btn {
      display: inline-flex;
      margin-top: 1.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 999px;
      border: none;
      background: #E0218A;
      color: #fff;
      font-weight: 600;
      font-size: 0.88rem;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .btn:hover { transform: scale(1.04); box-shadow: 0 8px 24px rgba(224,33,138,0.25); }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <main class="card">
    <span class="code">404</span>
    <h1>Page not found</h1>
    <p>This page doesn't exist or has been moved. Let's get you back home.</p>
    <a class="btn" href="/">Back to Home</a>
  </main>
</body>
</html>
