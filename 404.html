<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d0f17">
  <title>404 — Ashley Denham</title>
  <style>
    :root { color-scheme: dark; --accent: #EC4899; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0d0f17; color: #f8f4f7; }
    main { width: min(100%, 420px); border: 1px solid rgba(255,255,255,.14); border-radius: 24px; padding: 32px; text-align: center; background: rgba(255,255,255,.04); }
    .code { color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; }
    h1 { margin: 16px 0 0; font-size: clamp(2rem, 8vw, 3rem); line-height: 1; }
    p { margin: 16px 0 0; color: rgba(248,244,247,.72); line-height: 1.6; }
    a { display: inline-flex; margin-top: 28px; min-height: 44px; align-items: center; justify-content: center; border-radius: 999px; background: var(--accent); color: white; padding: 0 18px; font-weight: 700; text-decoration: none; }
    a:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Gone walkabout.</h1>
    <p>This page seems to have gone walkabout. Head back to the homepage.</p>
    <a href="/">Back home</a>
  </main>
</body>
</html>
