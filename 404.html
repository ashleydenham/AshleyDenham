<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0015">
  <meta name="color-scheme" content="dark">
  <title>404 — Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100svh;
      font-family: "Sora", sans-serif;
      color: #f6efff;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background:
        radial-gradient(800px 540px at 50% 20%, rgba(124, 58, 237, 0.3), transparent 60%),
        radial-gradient(600px 400px at 30% 80%, rgba(255, 46, 99, 0.15), transparent 60%),
        #0a0015;
    }
    .card {
      text-align: center;
      max-width: 36rem;
      border: 1px solid rgba(255, 105, 180, 0.25);
      border-radius: 1.6rem;
      padding: clamp(2rem, 6vw, 3.5rem);
      background: linear-gradient(165deg, rgba(13, 2, 30, 0.9), rgba(8, 1, 22, 0.85));
      box-shadow: 0 30px 70px rgba(2, 0, 8, 0.55);
      animation: rise 0.5s ease both;
    }
    .code {
      font-family: "Press Start 2P", monospace;
      font-size: clamp(2.5rem, 10vw, 5rem);
      background: linear-gradient(105deg, #ff2e63, #ff69b4, #00d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    h1 { font-size: 1.3rem; margin-top: 0.8rem; }
    p { color: #d7c8e8; margin-top: 0.6rem; line-height: 1.5; }
    .btn {
      display: inline-flex;
      margin-top: 1.5rem;
      padding: 0.7rem 1.3rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 105, 180, 0.48);
      background: linear-gradient(120deg, #ff2e63, #ff69b4);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .btn:hover { transform: scale(1.04); box-shadow: 0 0 40px rgba(255, 46, 99, 0.3), 0 0 70px rgba(0, 212, 255, 0.18); }
    @keyframes rise { from { opacity: 0; transform: translateY(1rem); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <main class="card">
    <span class="code">404</span>
    <h1>Lost in the void</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a class="btn" href="/">← Back to Home</a>
  </main>
</body>
</html>
